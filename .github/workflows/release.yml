name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Release jobs to run'
        required: true
        default: 'msstore-only'
        type: choice
        options:
          - msstore-only
          - full

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'push' || inputs.release_mode == 'full' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds both ARM64 and x64 via cross-compilation on Apple Silicon runner
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject build config
        run: node scripts/inject-build-config.js
        env:
          BUILD_AUTHOR_NAME: ${{ secrets.BUILD_AUTHOR_NAME }}
          BUILD_AUTHOR_EMAIL: ${{ secrets.BUILD_AUTHOR_EMAIL }}
          BUILD_PUBLISHER_NAME: ${{ secrets.BUILD_PUBLISHER_NAME }}

      - name: Build
        run: npm run build

      # Python 3.12+ removed distutils, but setuptools provides it
      - name: Install Python setuptools (macOS)
        if: matrix.platform == 'mac'
        run: pip3 install setuptools --break-system-packages

      # macOS: Setup Developer ID certificate for DMG/ZIP signing
      - name: Setup Developer ID Certificate (macOS)
        if: matrix.platform == 'mac'
        run: |
          # Create temporary keychain for Developer ID
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain || true
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          # Decode and import Developer ID Application certificate
          echo "$APPLE_DEVELOPER_ID_APPLICATION_P12" | base64 --decode > dev_id_cert.p12
          security import dev_id_cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm dev_id_cert.p12
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}

      # macOS: Build DMG and ZIP for GitHub release (signed with Developer ID + notarized)
      # Build ARM64 (native on Apple Silicon runner)
      - name: Package macOS ARM64 (DMG + ZIP)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg zip --arm64 --publish never
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # Build x64 (cross-compilation on Apple Silicon runner)
      - name: Package macOS x64 (DMG + ZIP)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg zip --x64 --publish never
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # NOTE: MAS (Mac App Store) builds are NOT included in GitHub releases.
      # MAS upload is handled by the separate 'build-mas' job.

      # NOTE: APPX (Microsoft Store) builds are handled by the separate
      # 'build-msstore' job, which builds the APPX and uploads it to
      # Partner Center using the msstore CLI. Direct Windows NSIS/portable
      # GitHub-release artifacts are intentionally not built.

      # Linux: Setup GPG for signing
      - name: Setup GPG (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          echo "GPG key imported"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GPG_KEY: C90FF75C007E7301
          GPG_PASSPHRASE: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Mac App Store: Build universal MAS package, upload, and submit for review
  # ─────────────────────────────────────────────────────────────
  build-mas:
    if: ${{ github.event_name == 'push' || inputs.release_mode == 'full' }}
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject build config
        run: node scripts/inject-build-config.js
        env:
          BUILD_AUTHOR_NAME: ${{ secrets.BUILD_AUTHOR_NAME }}
          BUILD_AUTHOR_EMAIL: ${{ secrets.BUILD_AUTHOR_EMAIL }}
          BUILD_PUBLISHER_NAME: ${{ secrets.BUILD_PUBLISHER_NAME }}

      # Python 3.12+ removed distutils, but setuptools provides it
      - name: Install Python setuptools
        run: pip3 install setuptools --break-system-packages

      - name: Install MAS certificates and provisioning profile
        shell: bash
        run: |
          set -euo pipefail

          APP_CERT_PATH="$RUNNER_TEMP/mas_application.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/mas_installer.p12"
          PROFILE_TEMP_PATH="$RUNNER_TEMP/GnuNae.provisionprofile"
          KEYCHAIN_PATH="$RUNNER_TEMP/mas-signing.keychain-db"
          PROFILE_INSTALL_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_INSTALL_PATH="$PROFILE_INSTALL_DIR/GnuNae.provisionprofile"

          echo "$APPLE_CERTIFICATE_APPLICATION_P12" | base64 --decode > "$APP_CERT_PATH"
          echo "$APPLE_CERTIFICATE_INSTALLER_P12" | base64 --decode > "$INSTALLER_CERT_PATH"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_TEMP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          mkdir -p "$PROFILE_INSTALL_DIR" certs
          cp "$PROFILE_TEMP_PATH" "$PROFILE_INSTALL_PATH"
          cp "$PROFILE_TEMP_PATH" certs/GnuNae.provisionprofile

          echo "MAS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MAS_PROVISION_PROFILE_PATH=$PROFILE_INSTALL_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_CERTIFICATE_APPLICATION_P12: ${{ secrets.APPLE_CERTIFICATE_APPLICATION_P12 }}
          APPLE_CERTIFICATE_INSTALLER_P12: ${{ secrets.APPLE_CERTIFICATE_INSTALLER_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-mas

      - name: Build and upload Mac App Store package
        run: npm run deploy:mas
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}

      - name: Submit Mac App Store build for review
        run: npm run submit:mas
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
          APP_STORE_CONNECT_BUNDLE_ID: ${{ secrets.APP_STORE_CONNECT_BUNDLE_ID }}
          APP_STORE_USES_NON_EXEMPT_ENCRYPTION: ${{ secrets.APP_STORE_USES_NON_EXEMPT_ENCRYPTION }}
          MAS_SUBMIT_WAIT_MINUTES: 90

      - name: MAS Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Mac App Store Build Summary"
            echo ""
            if [ -d release ] && find release -maxdepth 3 -name '*.pkg' -print -quit | grep -q .; then
              find release -maxdepth 3 -name '*.pkg' -print | sed 's/^/- Package: /'
            else
              echo "No MAS .pkg found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up MAS keychain and provisioning profile
        if: always()
        shell: bash
        run: |
          if [ -n "${MAS_KEYCHAIN_PATH:-}" ] && [ -f "$MAS_KEYCHAIN_PATH" ]; then
            security delete-keychain "$MAS_KEYCHAIN_PATH" || true
          fi
          if [ -n "${MAS_PROVISION_PROFILE_PATH:-}" ] && [ -f "$MAS_PROVISION_PROFILE_PATH" ]; then
            rm -f "$MAS_PROVISION_PROFILE_PATH"
          fi

  # ─────────────────────────────────────────────────────────────
  # Microsoft Store: Build APPX and upload to Partner Center
  # ─────────────────────────────────────────────────────────────
  build-msstore:
    if: ${{ github.event_name == 'push' || inputs.release_mode == 'full' || inputs.release_mode == 'msstore-only' }}
    # Keep MSIX packaging on the known-good Windows toolchain until native
    # rebuilds support VS2026 runners.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Configure msstore CLI
        run: |
          msstore reconfigure `
            --tenantId $env:MSSTORE_TENANT_ID `
            --sellerId $env:MSSTORE_SELLER_ID `
            --clientId $env:MSSTORE_CLIENT_ID `
            --clientSecret $env:MSSTORE_CLIENT_SECRET
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          MSSTORE_SELLER_ID: ${{ secrets.MSSTORE_SELLER_ID }}

      - name: Install dependencies
        run: npm ci

      - name: Inject build config
        run: node scripts/inject-build-config.js
        env:
          BUILD_AUTHOR_NAME: ${{ secrets.BUILD_AUTHOR_NAME }}
          BUILD_AUTHOR_EMAIL: ${{ secrets.BUILD_AUTHOR_EMAIL }}
          BUILD_PUBLISHER_NAME: ${{ secrets.BUILD_PUBLISHER_NAME }}

      - name: Download Node.js Portable (Windows)
        run: node scripts/download-node.js

      - name: Install Codex CLI
        run: node scripts/install-codex.js

      - name: Build
        run: npm run build

      # Build APPX only (unsigned — MS Store signs during submission)
      # Note: --config.appx.publisher override is required because electron-builder's
      # ${env.X} substitution doesn't work for appx.publisher (same workaround as load-env.js)
      - name: Package APPX
        run: npx electron-builder --win appx --publish never --config.appx.publisher="${{ secrets.MSSTORE_PUBLISHER_CN }}"
        env:
          MSSTORE_PUBLISHER_CN: ${{ secrets.MSSTORE_PUBLISHER_CN }}

      - name: Generate Microsoft Store certification notes
        run: node scripts/msstore-certification.js --write-notes release/msstore-certification-notes.txt --dry-run

      # Upload APPX/MSIX to Partner Center, patch certification notes, then publish.
      # The no-commit publish creates or updates the draft so certification notes can
      # be applied to the same submission before it is sent to review.
      - name: Upload and submit to Microsoft Store
        shell: pwsh
        run: |
          # List what was built for debugging
          Write-Host "=== Release directory contents ==="
          Get-ChildItem -Path release -Recurse | Format-Table Name, Length, FullName

          # Find APPX file and rename to .msix (msstore CLI expects .msix extension)
          $appx = Get-ChildItem -Path release -Filter *.appx | Select-Object -First 1
          if ($appx) {
            $msixName = $appx.Name -replace '\.appx$', '.msix'
            Rename-Item -Path $appx.FullName -NewName $msixName
            Write-Host "Renamed $($appx.Name) -> $msixName"
          } else {
            Write-Error "No .appx file found in release/"
            exit 1
          }

          Write-Host "=== Creating Microsoft Store draft ==="
          Write-Host "Product ID: $env:MSSTORE_PRODUCT_ID"
          Write-Host "Input Directory: ${{ github.workspace }}/release"
          $publishOutput = & msstore publish . -id $env:MSSTORE_PRODUCT_ID -i "${{ github.workspace }}/release" -nc -v 2>&1
          $publishExit = $LASTEXITCODE
          $publishOutput | ForEach-Object { Write-Host $_ }
          if ($publishExit -ne 0) {
            exit $publishExit
          }

          $publishText = $publishOutput -join "`n"
          $submissionMatch = [regex]::Match($publishText, '/submissions/([0-9]+)')
          if (-not $submissionMatch.Success) {
            $submissionMatch = [regex]::Match($publishText, '(?i)(?:submissionId|submission\s+id|id)\s*[:=]\s*([0-9]{8,})')
          }
          if ($submissionMatch.Success) {
            $env:MSSTORE_SUBMISSION_ID = $submissionMatch.Groups[$submissionMatch.Groups.Count - 1].Value
            Write-Host "Resolved Microsoft Store submission ID from publish output."
          } else {
            Write-Host "No submission ID found in publish output; certification script will resolve the pending submission."
          }

          Write-Host "=== Updating certification notes and verifying package version ==="
          node scripts/msstore-certification.js --patch-pending --verify-package-version

          Write-Host "=== Publishing Microsoft Store draft ==="
          msstore submission publish $env:MSSTORE_PRODUCT_ID -v
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          MSSTORE_PRODUCT_ID: ${{ secrets.MSSTORE_PRODUCT_ID }}
          MSSTORE_CERTIFICATION_TEST_ACCOUNT_NOTE: ${{ secrets.MSSTORE_CERTIFICATION_TEST_ACCOUNT_NOTE }}

      - name: MS Store Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "## Microsoft Store Build Summary" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          Write-Host "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          $pkg = Get-ChildItem -Path release -Include *.appx,*.msix -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($pkg) {
            Write-Host "Package: $($pkg.Name) ($([math]::Round($pkg.Length / 1MB, 1)) MB)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          } else {
            Write-Host "No APPX/MSIX found" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          }

  release:
    needs: build
    if: ${{ github.event_name == 'push' || inputs.release_mode == 'full' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
