name: Store Status Watch

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      appeal_mode:
        description: 'Generate or send the Microsoft Store certification appeal email.'
        type: choice
        default: none
        options:
          - none
          - dry_run
          - send
      appeal_recipient:
        description: 'Appeal recipient.'
        type: string
        default: reportapp@microsoft.com
      appeal_send_confirmation:
        description: 'Required for send mode: SEND_TO_MICROSOFT_STORE'
        type: string
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  group: store-status-watch
  cancel-in-progress: false

jobs:
  scan:
    name: Scan store review status
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.3
        with:
          version: v0.3.7

      - name: Check Microsoft Store Developer CLI version
        shell: pwsh
        run: msstore --version

      - name: Generate store status report
        shell: pwsh
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          MSSTORE_SELLER_ID: ${{ secrets.MSSTORE_SELLER_ID }}
          MSSTORE_PRODUCT_ID: ${{ secrets.MSSTORE_PRODUCT_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
          APP_STORE_CONNECT_BUNDLE_ID: ${{ secrets.APP_STORE_CONNECT_BUNDLE_ID }}
        run: |
          node scripts/store-status-watch.js --output store-status-report.md --json store-status-report.json

      - name: Add report to step summary
        shell: pwsh
        run: |
          Get-Content store-status-report.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Create or update store status issue
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $issueTitle = "Store status watch"
          $existingIssue = gh issue list `
            --state open `
            --search "Store status watch in:title" `
            --json number `
            --jq ".[0].number // empty"

          if ($existingIssue) {
            gh issue edit $existingIssue `
              --title $issueTitle `
              --body-file store-status-report.md
            Write-Host "Updated issue #$existingIssue"
          } else {
            gh issue create `
              --title $issueTitle `
              --body-file store-status-report.md
          }

      - name: Generate Microsoft Store appeal email
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.appeal_mode != 'none' }}
        shell: pwsh
        env:
          STORE_APPEAL_RECIPIENT: ${{ inputs.appeal_recipient }}
          STORE_APPEAL_SEND_CONFIRM: ${{ inputs.appeal_send_confirmation }}
          MS365_TENANT_ID: ${{ secrets.MS365_TENANT_ID }}
          MS365_CLIENT_ID: ${{ secrets.MS365_CLIENT_ID }}
          MS365_CLIENT_SECRET: ${{ secrets.MS365_CLIENT_SECRET }}
          MS365_SENDER_USER: ${{ secrets.MS365_SENDER_USER }}
        run: |
          $mode = '${{ inputs.appeal_mode }}'
          $appealArgs = @('--output', 'store-appeal-email.md', '--json', 'store-appeal-email.json')
          if ($mode -eq 'send') {
            $appealArgs = @('--send') + $appealArgs
          } else {
            $appealArgs = @('--dry-run') + $appealArgs
          }

          node scripts/store-appeal-email.js @appealArgs
          Get-Content store-appeal-email.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
